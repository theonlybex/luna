<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #111118;
      --surface:  #1a1a24;
      --surface2: #222233;
      --border:   #2a2a3d;
      --text:     #e2e8f0;
      --text2:    #64748b;
      --text3:    #94a3b8;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --green:    #10b981;
      --green2:   #34d399;
      --red:      #f43f5e;
      --amber:    #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, Roboto, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Header ── */
    #hdr {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    #hdr-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-right: auto;
    }
    .nav-btn {
      height: 30px; padding: 0 14px;
      border-radius: 8px; border: 1px solid var(--border);
      background: transparent; cursor: pointer;
      font-size: 12px; font-weight: 600; color: var(--text2);
      font-family: inherit;
      transition: all .15s;
    }
    .nav-btn:hover { color: var(--text); border-color: #444; }
    .nav-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .hdr-btn {
      height: 28px; padding: 0 10px;
      border-radius: 6px; border: none;
      background: transparent; cursor: pointer;
      font-size: 11px; color: var(--text2);
      font-family: inherit;
    }
    .hdr-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── Shared view container ── */
    .view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .view.active { display: flex; }

    /* ── Agent list panel (40% top) ── */
    #agent-list-panel {
      height: 40%;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    #agent-list-header {
      padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #agent-list-title {
      font-size: 11px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.6px;
      flex: 1;
    }
    #new-agent-btn {
      height: 26px; padding: 0 12px;
      border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--accent2);
      font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .12s;
    }
    #new-agent-btn:hover { background: var(--surface); border-color: var(--accent); }
    #agent-list {
      flex: 1; overflow-y: auto; padding: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      align-content: start;
    }
    .agent-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      border: 1px solid transparent;
      transition: all .12s; position: relative;
    }
    .agent-list-item:hover { background: var(--surface); }
    .agent-list-item.active {
      background: var(--surface);
      border-color: rgba(99,102,241,.3);
    }
    .agent-list-item.active::before {
      content: ''; position: absolute;
      left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .agent-list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .agent-list-info { flex: 1; min-width: 0; }
    .agent-list-goal {
      font-size: 12px; font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .agent-list-status {
      font-size: 10px; color: var(--text2); margin-top: 2px;
      text-transform: capitalize;
    }
    .agent-list-empty {
      padding: 20px 14px; text-align: center;
      font-size: 11px; color: var(--text2); line-height: 1.7;
    }
    .agent-list-remove {
      width: 22px; height: 22px; border-radius: 6px;
      border: none; background: transparent; color: var(--text2);
      font-size: 14px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s; opacity: 0;
    }
    .agent-list-item:hover .agent-list-remove { opacity: 1; }
    .agent-list-remove:hover { background: rgba(244,63,94,.15); color: var(--red); }
    .pulse { animation: lp 1.4s ease-in-out infinite; }
    @keyframes lp { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Chat area (60% bottom) ── */
    #agent-chat-panel {
      height: 60%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Login screen ── */
    #login-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 20px; text-align: center;
    }
    #login-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: #fff;
      box-shadow: 0 8px 32px rgba(99,102,241,0.25);
    }
    #login-title { font-size: 20px; font-weight: 700; color: var(--text); }
    #login-sub { font-size: 12px; color: var(--text2); line-height: 1.75; max-width: 240px; }
    #login-btn {
      width: 100%; max-width: 240px; height: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    #login-btn:hover { background: #2e2e44; border-color: var(--accent); }

    /* API key form */
    #apikey-form {
      width: 100%; max-width: 280px;
      display: none; flex-direction: column; gap: 10px;
    }
    #apikey-inp {
      width: 100%; padding: 10px 14px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 12px; font-family: monospace; outline: none;
    }
    #apikey-inp:focus { border-color: var(--accent); }
    #apikey-err { font-size: 11px; color: var(--red); display: none; }
    #apikey-save {
      height: 40px; border-radius: 10px; border: none;
      background: var(--accent); color: white;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    #apikey-save:hover { background: #4f46e5; }
    #apikey-save:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; }
    #apikey-cancel {
      height: 36px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit;
    }

    /* ── Agent input screen ── */
    #input-screen {
      flex: 1; display: none; flex-direction: column;
      padding: 16px; gap: 12px;
    }
    #input-hint { font-size: 12px; color: var(--text2); line-height: 1.55; }
    #input-ta {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      font-size: 13px; font-family: inherit;
      resize: none; outline: none; min-height: 100px; line-height: 1.5;
    }
    #input-ta:focus { border-color: var(--accent); }
    #input-ta::placeholder { color: var(--text2); }

    #step-selector-wrap { display: flex; flex-direction: column; gap: 6px; }
    #step-selector-label {
      font-size: 10px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    #step-selector { display: flex; gap: 6px; flex-wrap: wrap; }
    .step-opt {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit;
      transition: all .12s;
    }
    .step-opt:hover { border-color: var(--accent); color: var(--text); }
    .step-opt.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

    #input-submit {
      height: 42px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    #input-submit:hover { background: #4f46e5; }
    #input-submit:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; }

    /* ── Agent screen ── */
    .agent-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .agent-msgs {
      flex: 1; overflow-y: auto; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { display: flex; flex-direction: column; max-width: 90%; }
    .msg.luna { align-self: flex-start; }
    .sender { font-size: 10px; color: var(--text2); margin-bottom: 3px; padding: 0 4px; }
    .bubble {
      padding: 10px 14px; border-radius: 12px;
      font-size: 13px; line-height: 1.55;
      color: var(--text); word-break: break-word;
    }
    .msg.luna .bubble { background: var(--surface); border: 1px solid var(--border); }
    .step-tag {
      font-size: 10px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.4px; margin-right: 5px;
    }
    .sys-note {
      align-self: center; font-size: 10px; color: var(--text2);
      font-family: monospace; opacity: 0.7; padding: 2px 0;
    }

    /* Agent action bar */
    .agent-bar {
      flex-shrink: 0; padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .agent-bar-btns { display: flex; gap: 8px; }
    .agent-bar-btn {
      flex: 1; height: 34px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text2); font-size: 12px; font-weight: 500;
      font-family: inherit; cursor: pointer; transition: all .12s;
    }
    .agent-bar-btn:hover { color: var(--text); border-color: #555; }
    .agent-bar-btn.stop { border-color: rgba(244,63,94,.4); color: var(--red); }
    .agent-bar-btn.stop:hover { background: rgba(244,63,94,.1); }
    .agent-bar-btn.resume { background: var(--accent); border-color: var(--accent); color: #fff; }
    .agent-correction {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 12px; font-family: inherit;
      resize: none; outline: none; min-height: 56px;
    }
    .agent-correction:focus { border-color: var(--accent); }

    /* ══════════════════════════════════════════════════════════════════════════ */
    /* AUTOMATIONS VIEW                                                         */
    /* ══════════════════════════════════════════════════════════════════════════ */

    /* Automations list */
    #auto-list-container {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    #auto-toolbar {
      padding: 12px; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .auto-tool-btn {
      flex: 1; height: 38px; border-radius: 10px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #record-btn {
      background: linear-gradient(135deg, #dc2626, var(--red));
      color: #fff;
    }
    #record-btn:hover { filter: brightness(1.1); }
    #record-btn.recording {
      background: var(--surface2);
      border: 1px solid var(--red);
      color: var(--red);
      animation: lp 1.4s ease-in-out infinite;
    }

    #auto-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .auto-empty {
      padding: 32px 16px; text-align: center;
      color: var(--text2); font-size: 12px; line-height: 1.8;
    }
    .auto-item {
      padding: 12px 14px; border-radius: 10px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 4px;
      transition: all .15s; position: relative;
    }
    .auto-item:hover { background: var(--surface); }
    .auto-item.selected {
      background: var(--surface);
      border-color: rgba(99,102,241,.3);
    }
    .auto-item.selected::before {
      content: ''; position: absolute;
      left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .auto-item-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .auto-item-meta {
      font-size: 11px; color: var(--text2); margin-top: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .auto-item-running { color: var(--green); }
    .auto-item-steps { color: var(--text2); }

    /* Automation detail view */
    #auto-detail {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #auto-detail-hdr {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #auto-detail-name {
      flex: 1; background: transparent; border: none;
      color: var(--text); font-size: 15px; font-weight: 700;
      font-family: inherit; outline: none;
    }
    #auto-detail-name::placeholder { color: var(--text2); }
    .detail-btn {
      height: 30px; padding: 0 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text2); font-size: 11px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all .12s;
      display: flex; align-items: center; gap: 5px;
    }
    .detail-btn:hover { color: var(--text); border-color: #555; }
    .detail-btn.play { background: var(--green); border-color: var(--green); color: #051a10; }
    .detail-btn.play:hover { background: var(--green2); }
    .detail-btn.stop-play { border-color: rgba(244,63,94,.4); color: var(--red); }
    .detail-btn.stop-play:hover { background: rgba(244,63,94,.1); }
    .detail-btn.delete:hover { border-color: rgba(244,63,94,.4); color: var(--red); }

    #auto-detail-body {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .recorded-step {
      padding: 10px 14px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 12px; color: var(--text3); line-height: 1.5;
      display: flex; align-items: center; gap: 10px;
    }
    .recorded-step-num {
      font-size: 10px; font-weight: 700; color: var(--text2);
      width: 22px; text-align: center; flex-shrink: 0;
    }
    .recorded-step-icon {
      font-size: 14px; flex-shrink: 0; width: 20px; text-align: center;
    }
    .recorded-step-desc { flex: 1; color: var(--text); }
    .recorded-step-coords {
      font-size: 10px; color: var(--text2); font-family: monospace;
    }

    #auto-url-bar {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #auto-url-icon { font-size: 13px; flex-shrink: 0; }
    #auto-start-url {
      flex: 1; background: transparent; border: none;
      color: var(--text2); font-size: 11px; font-family: monospace;
      outline: none; min-width: 0;
    }
    #auto-start-url:focus { color: var(--text); }
    #auto-start-url::placeholder { color: var(--text2); opacity: 0.5; }

    #auto-detail-footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .loop-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text3); cursor: pointer;
    }
    .loop-toggle input {
      width: 16px; height: 16px; accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── Recording live feed ── */
    #recording-view {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #recording-header {
      padding: 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); animation: lp 1.2s ease-in-out infinite;
    }
    #recording-label { font-size: 13px; font-weight: 600; color: var(--red); }
    #recording-steps {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #recording-bar {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0;
    }
    #rec-name-input {
      flex: 1; height: 36px; padding: 0 12px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      font-size: 12px; font-family: inherit; outline: none;
    }
    #rec-name-input:focus { border-color: var(--accent); }
    #stop-rec-btn {
      height: 36px; padding: 0 18px; border-radius: 8px; border: none;
      background: var(--red); color: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    #stop-rec-btn:hover { filter: brightness(1.1); }

    /* ── Connection banner ── */
    #conn-err {
      padding: 8px 14px; background: rgba(244,63,94,.1);
      border-bottom: 1px solid rgba(244,63,94,.2);
      font-size: 11px; color: var(--red);
      display: none; text-align: center;
    }
  </style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <span id="hdr-title">☾ Luna</span>
  <button class="nav-btn active" data-view="agents" id="nav-agents">Agents</button>
  <button class="nav-btn" data-view="automations" id="nav-autos">Automations</button>
  <button class="hdr-btn" id="settings-btn">⚙</button>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- AGENTS VIEW                                                               -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="agents-view" class="view active">

  <!-- Agent list panel (40%) -->
  <div id="agent-list-panel">
    <div id="agent-list-header">
      <span id="agent-list-title">Agents</span>
      <button id="new-agent-btn">+ New</button>
    </div>
    <div id="agent-list"></div>
  </div>

  <!-- Chat panel (60%) -->
  <div id="agent-chat-panel">

    <!-- Login -->
    <div id="login-screen">
      <div id="login-icon">☾</div>
      <div id="login-title">Luna</div>
      <div id="login-sub">Enter your Anthropic API key to start using Luna.</div>
      <div id="apikey-form">
        <input id="apikey-inp" type="password" placeholder="sk-ant-…" autocomplete="off" spellcheck="false" />
        <div id="apikey-err">Key must start with sk-ant-</div>
        <button id="apikey-save">Save &amp; continue</button>
        <button id="apikey-cancel">Cancel</button>
      </div>
      <button id="login-btn">Enter API key</button>
    </div>

    <!-- Agent input -->
    <div id="input-screen">
      <div id="input-hint">Describe your goal and Luna will browse the web to complete it.</div>
      <textarea id="input-ta" placeholder="e.g. Find the cheapest flight from NYC to London next month"></textarea>
      <div id="step-selector-wrap">
        <div id="step-selector-label">Max steps</div>
        <div id="step-selector">
          <button class="step-opt" data-steps="5">5</button>
          <button class="step-opt selected" data-steps="25">25</button>
          <button class="step-opt" data-steps="100">100</button>
          <button class="step-opt" data-steps="0">∞</button>
        </div>
      </div>
      <button id="input-submit">Run Agent</button>
    </div>

    <!-- Agent screens injected by JS -->

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- AUTOMATIONS VIEW                                                          -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="automations-view" class="view">

  <!-- List + toolbar -->
  <div id="auto-list-container">
    <div id="auto-toolbar">
      <button class="auto-tool-btn" id="record-btn">
        <span style="width:8px;height:8px;border-radius:50%;background:#fff;flex-shrink:0"></span>
        Record New
      </button>
    </div>
    <div id="auto-list"></div>
  </div>

  <!-- Detail view (shown when an automation is selected) -->
  <div id="auto-detail">
    <div id="auto-detail-hdr">
      <input id="auto-detail-name" placeholder="Automation name…" spellcheck="false" />
      <button class="detail-btn play" id="play-btn">▶ Play</button>
      <button class="detail-btn stop-play" id="stop-play-btn" style="display:none">■ Stop</button>
      <button class="detail-btn delete" id="del-auto-btn">🗑</button>
    </div>
    <div id="auto-url-bar">
      <span id="auto-url-icon">🌐</span>
      <input id="auto-start-url" type="url" placeholder="No start URL" spellcheck="false" />
    </div>
    <div id="auto-detail-body"></div>
    <div id="auto-detail-footer">
      <label class="loop-toggle">
        <input type="checkbox" id="loop-checkbox" />
        Loop until stopped
      </label>
    </div>
  </div>

  <!-- Recording live view (shown during recording) -->
  <div id="recording-view">
    <div id="recording-header">
      <span class="rec-dot"></span>
      <span id="recording-label">Recording your actions...</span>
    </div>
    <div id="recording-url-bar" style="padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;">

    </div>
    <div id="recording-steps"></div>
    <div id="recording-bar">

  </div>

</div>
